<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankalya</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #fefefe;
            overflow: hidden; /* Kaydırma çubuğu çıkmasın diye */
        }

        .logo {
            width: 90%; /* Sayfayı kaplayacak büyüklük */
            max-width: 1000px; /* Çok aşırı yayılmaması için üst sınır */
            height: auto;
        }

        h2 {
            font-family: sans-serif;
            color: #666;
            font-size: 1.5rem;
            letter-spacing: 15px; /* Daha modern bir görünüm için harf arası açık */
            margin-top: 50px;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <img src="Logo.jpg" alt="Logo" class="logo">
    
    <h2>COMING SOON</h2>

</body>
</html>
