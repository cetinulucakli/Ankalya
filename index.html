<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankalya | Coming Soon</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Logonun temiz arka planına benzer hafif gri/beyaz */
            background-color: #fefefe; 
        }

        .coming-soon-container {
            text-align: center;
            padding: 20px;
        }

        .logo {
            max-width: 280px; /* Logonun boyutu */
            height: auto;
            margin-bottom: 20px; /* Metinle logo arası boşluk */
        }

        h1 {
            /* Logonun mavisini taklit eden bir renk */
            color: #03649e; 
            font-size: 3rem;
            margin: 0;
            letter-spacing: 5px; /* Harf arası boşluk, modern durur */
        }

        h2 {
            color: #666; /* Daha açık gri */
            font-size: 1.2rem;
            margin-top: 10px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="coming-soon-container">
        <img src="image_4.png" alt="Ankalya Logo" class="logo">
        <h1>ANKALYA</h1>
        <h2>COMING SOON</h2>
        
        <div class="footer">
            info@ankalya.tr
        </div>
    </div>

</body>
</html>
